version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # Agrupar para reducir ruido de PRs.
    groups:
      produccion:
        dependency-type: production
      desarrollo:
        dependency-type: development
    # No proponer saltos de versión MAYOR (migraciones rompedoras) de forma automática.
    # Solo minor/patch + parches de seguridad. Los majors (React 19, etc.) se hacen a mano con QA.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      # eslint-plugin-react-refresh 0.5+ exige eslint 9 (peer). Mantenemos eslint 8 hasta la
      # migración manual del ecosistema eslint post-beta; hasta entonces, ignorarlo.
      - dependency-name: "eslint-plugin-react-refresh"
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
